<div class="page-container">

  <header class="page-header">
    <h1 class="page-title">Réserver un terrain</h1>
    <p class="page-subtitle">
      Sélectionnez votre centre pour accéder aux différents terrains ainsi qu’à leurs disponibilités.
    </p>
    <div class="title-separator"></div>
  </header>

  <div class="court-grid">
    @for (site of sites; track site.id) {
      <mat-card class="padel-card group">

        <mat-card-header class="p-8">
          <div mat-card-avatar class="padel-avatar">
            {{ site.initial }}
          </div>
          <mat-card-title class="font-black text-2xl tracking-tight text-slate-800 uppercase">
            {{ site.city }}
          </mat-card-title>
          <mat-card-subtitle class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em] mt-1">
            {{ site.clubName }}
          </mat-card-subtitle>
        </mat-card-header>

        <div class="card-image-container">
          <img mat-card-image
               [src]="site.image"
               [alt]="site.city"
               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
        </div>

        <mat-card-content class="p-8 flex-grow">
          <p class="card-description">
            {{ site.description }}
          </p>
        </mat-card-content>

        <mat-card-actions class="p-8 pt-0">
          <button mat-flat-button
                  [routerLink]="['/reserver', site.id]"
                  class="btn-primary-padel">
            Réserver à {{ site.city }}
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
